<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Web-AR Auswahl</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f0f0; }
        
        /* Grid-Menü */
        .grid-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        button { padding: 15px; cursor: pointer; border: none; background: #333; color: white; border-radius: 8px; }

        /* Viewer Container */
        #container { width: 100%; height: 80vh; }
        model-viewer { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="grid-menu">
        <button onclick="loadModel('Demoszene.glb')">Web Big</button>
        <button onclick="loadModel('Demoszene small.glb')">Web Small</button>
        <button onclick="loadModel('floating Cube.glb')">Cube</button>
    </div>

    <div id="container">
        <model-viewer 
    id="viewer" 
    poster="DemoSzene Referenz.png" 
    ar 
    camera-controls>
</model-viewer>
    </div>

    <script>
        const viewer = document.querySelector('#viewer');
        const isFirefox = navigator.userAgent.toLowerCase().indexOf('firefox') > -1;
        
        // Funktion 1 & 2: Modell wechseln
        function loadModel(modelName) {
            viewer.src = modelName;
            if (isFirefox) {
                alert("Hinweis: AR-Features funktionieren am besten mit Chrome (Android) oder Safari (iOS), jedoch gar nicht auf Firefox.");
            }
        }

    </script>
</body>
</html>
