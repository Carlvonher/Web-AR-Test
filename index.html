<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Web-AR Test</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        
        /* Debug-Info: Wird angezeigt, wenn das Modell noch lädt */
        #debug-info { 
            position: absolute; top: 10px; left: 10px; z-index: 10; 
            background: rgba(0,0,0,0.7); color: white; padding: 10px; 
        }

        model-viewer { width: 100%; height: 100vh; display: block; }
    </style>
</head>
<body>

    <div id="debug-info">Version 1.0 - Lade 3D-Modell...</div>

    <model-viewer 
        id="main-viewer"
        src="Demoszene.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        autoplay 
        tone-mapping="neutral" 
        shadow-intensity="1">

        <div class="progress-bar hide" slot="progress-bar">
            <div class="update-bar"></div>
        </div>

        <button slot="ar-button" id="ar-button">
            View in your space
        </button>
    </model-viewer>

    <script>
        // Kleiner Debug-Trick: Wenn das Modell geladen ist, verstecke den Debug-Text
        const viewer = document.querySelector('#main-viewer');
        viewer.addEventListener('load', () => {
            document.querySelector('#debug-info').style.display = 'none';
        });
    </script>
</body>
</html>
